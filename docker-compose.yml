# ===========================================
# AI Audiobook Workshop - Docker Compose
# ===========================================

services:
  # ---------- 后端 API 服务 ----------
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: audiobook-backend
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      - APP_NAME=${APP_NAME}
      - APP_ENV=${APP_ENV}
      - APP_DEBUG=${APP_DEBUG}
      - DJANGO_SETTINGS_MODULE=config.settings
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql://${DB_USER:-audiobook_user}:${DB_PASSWORD:-your-db-password}@postgres:5432/${DB_NAME:-audiobook_db}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379/${REDIS_DB:-0}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-audiobook_db}
      - DB_USER=${DB_USER:-audiobook_user}
      - DB_PASSWORD=${DB_PASSWORD:-your-db-password}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=${REDIS_DB:-0}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_SECURE=false
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - MINIMAX_API_HOST=${MINIMAX_API_HOST:-https://api.minimax.chat}
      - MINIMAX_GROUP_ID=${MINIMAX_GROUP_ID}
      - WATCH_DIR=${WATCH_DIR:-/books/incoming}
      - WATCH_DIRS=${WATCH_DIRS:-}
      - WATCH_INTERVAL=${WATCH_INTERVAL:-60}
      - WATCH_ENABLED=${WATCH_ENABLED:-true}
      - WATCH_MAX_FILE_SIZE_MB=${WATCH_MAX_FILE_SIZE_MB:-500}
      - WATCH_CONCURRENT=${WATCH_CONCURRENT:-3}
      - WATCH_STATUS_INTERVAL=${WATCH_STATUS_INTERVAL:-300}
      - WATCH_DEAD_LETTER_DIR=${WATCH_DEAD_LETTER_DIR:-/books/dead-letter}
      - COST_DAILY_LIMIT=${COST_DAILY_LIMIT:-50}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./backend:/app
      - ./books:/books
      - ./data/incoming:/data/incoming
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped
    networks:
      - audiobook-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ---------- Celery Worker ----------
  celery-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: audiobook-celery-worker
    working_dir: /app
    command: celery -A config worker --loglevel=info --concurrency=2 -Q celery,analyze,pipeline,watch
    environment:
      - PYTHONPATH=/app
      - DJANGO_SETTINGS_MODULE=config.settings
      - DATABASE_URL=postgresql://${DB_USER:-audiobook_user}:${DB_PASSWORD:-your-db-password}@postgres:5432/${DB_NAME:-audiobook_db}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-audiobook_db}
      - DB_USER=${DB_USER:-audiobook_user}
      - DB_PASSWORD=${DB_PASSWORD:-your-db-password}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=${REDIS_DB:-0}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - MINIMAX_API_HOST=${MINIMAX_API_HOST:-https://api.minimax.chat}
      - MINIMAX_GROUP_ID=${MINIMAX_GROUP_ID}
      - WATCH_DIR=${WATCH_DIR:-/books/incoming}
      - WATCH_DIRS=${WATCH_DIRS:-}
      - WATCH_INTERVAL=${WATCH_INTERVAL:-60}
      - WATCH_ENABLED=${WATCH_ENABLED:-true}
      - WATCH_MAX_FILE_SIZE_MB=${WATCH_MAX_FILE_SIZE_MB:-500}
      - WATCH_CONCURRENT=${WATCH_CONCURRENT:-3}
      - WATCH_STATUS_INTERVAL=${WATCH_STATUS_INTERVAL:-300}
      - WATCH_DEAD_LETTER_DIR=${WATCH_DEAD_LETTER_DIR:-/books/dead-letter}
    volumes:
      - ./books:/books
      - ./data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped
    networks:
      - audiobook-network

  # ---------- Celery Beat (定时任务调度器) ----------
  celery-beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: audiobook-celery-beat
    working_dir: /app
    command: celery -A config beat --loglevel=info
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - PYTHONPATH=/app
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379/${REDIS_DB:-0}
      - WATCH_DIR=${WATCH_DIR:-/books/incoming}
      - WATCH_DIRS=${WATCH_DIRS:-}
      - WATCH_ENABLED=${WATCH_ENABLED:-true}
      - WATCH_INTERVAL=${WATCH_INTERVAL:-60}
      - WATCH_STATUS_INTERVAL=${WATCH_STATUS_INTERVAL:-300}
      - WATCH_DEAD_LETTER_DIR=${WATCH_DEAD_LETTER_DIR:-/books/dead-letter}
    volumes:
      - ./books:/books
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - audiobook-network

  # ---------- File Watcher Service (watchdog) ----------
  watchdog:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: audiobook-watchdog
    command: python -c "from services.svc_file_watcher import main; main()"
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-audiobook_user}:${DB_PASSWORD:-your-db-password}@postgres:5432/${DB_NAME:-audiobook_db}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379/${REDIS_DB:-0}
      - WATCH_DIR=${WATCH_DIR:-/books/incoming}
      - WATCH_DIRS=${WATCH_DIRS:-}
      - WATCH_MAX_FILE_SIZE_MB=${WATCH_MAX_FILE_SIZE_MB:-500}
      - WATCH_CONCURRENT=${WATCH_CONCURRENT:-3}
      - WATCH_STATUS_INTERVAL=${WATCH_STATUS_INTERVAL:-300}
      - WATCH_DEAD_LETTER_DIR=${WATCH_DEAD_LETTER_DIR:-/books/dead-letter}
    volumes:
      - ./books:/books
      - ./data/incoming:/data/incoming
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - audiobook-network
    profiles:
      - watch

  # ---------- Flower (Celery 监控) ----------
  flower:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: audiobook-flower
    command: celery -A tasks.celery_app flower --port=5555
    ports:
      - "${FLOWER_PORT:-5555}:5555"
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-audiobook_user}:${DB_PASSWORD:-your-db-password}@postgres:5432/${DB_NAME:-audiobook_db}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379/${REDIS_DB:-0}
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-}@redis:6379/${REDIS_DB:-0}
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-}@redis:6379/${REDIS_DB:-0}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - audiobook-network
    profiles:
      - monitoring

  # ---------- PostgreSQL 数据库 ----------
  postgres:
    image: postgres:16-alpine
    container_name: audiobook-postgres
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    restart: unless-stopped
    networks:
      - audiobook-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-audiobook_user} -d ${DB_NAME:-audiobook_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- Redis 缓存与消息队列 ----------
  redis:
    image: redis:7-alpine
    container_name: audiobook-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ./data/redis:/data
    restart: unless-stopped
    networks:
      - audiobook-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- MinIO 对象存储 ----------
  minio:
    image: minio/minio:latest
    container_name: audiobook-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}
    volumes:
      - ./data/minio:/data
    ports:
      - "9000:9000"   # API 端口
      - "9001:9001"   # Console 端口
    restart: unless-stopped
    networks:
      - audiobook-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ---------- 前端 Web 服务 ----------
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: audiobook-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://host.docker.internal:8000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - audiobook-network
    profiles:
      - frontend

# ---------- 网络配置 ----------
networks:
  audiobook-network:
    driver: bridge

# ---------- 通用卷 ----------
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  minio-data:
    driver: local
