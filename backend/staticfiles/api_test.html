<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API 测试界面 - AI 有声书工坊</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg: #0f172a;
            --bg-card: #1e293b;
            --bg-hover: #334155;
            --border: #334155;
            --text: #e2e8f0;
            --text-dim: #94a3b8;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
            --radius: 8px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            padding: 20px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.3);
        }

        .header h1 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .badge {
            background: rgba(255, 255, 255, 0.2);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }

        .base-url-input {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            width: 200px;
            outline: none;
        }

        .base-url-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .base-url-input:focus {
            border-color: rgba(255, 255, 255, 0.5);
        }

        /* Layout */
        .container {
            display: flex;
            height: calc(100vh - 64px);
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            min-width: 260px;
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            padding: 12px 0;
        }

        .sidebar::-webkit-scrollbar {
            width: 4px;
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }

        .sidebar-section {
            padding: 8px 16px 4px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .endpoint-btn {
            display: block;
            width: 100%;
            padding: 8px 16px 8px 24px;
            background: none;
            border: none;
            color: var(--text);
            font-size: 13px;
            text-align: left;
            cursor: pointer;
            transition: all 0.15s;
            border-left: 3px solid transparent;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .endpoint-btn:hover {
            background: var(--bg-hover);
        }

        .endpoint-btn.active {
            background: rgba(99, 102, 241, 0.15);
            border-left-color: var(--primary);
            color: #a5b4fc;
        }

        .method-tag {
            font-size: 10px;
            font-weight: 700;
            padding: 1px 6px;
            border-radius: 4px;
            min-width: 36px;
            text-align: center;
        }

        .method-GET {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
        }

        .method-POST {
            background: rgba(34, 197, 94, 0.2);
            color: #4ade80;
        }

        .method-PUT {
            background: rgba(245, 158, 11, 0.2);
            color: #fbbf24;
        }

        .method-DELETE {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }

        /* Main */
        .main {
            flex: 1;
            overflow-y: auto;
            padding: 24px 32px;
        }

        .main::-webkit-scrollbar {
            width: 6px;
        }

        .main::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .panel {
            display: none;
        }

        .panel.active {
            display: block;
        }

        .panel-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .panel-path {
            font-size: 13px;
            color: var(--text-dim);
            margin-bottom: 20px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            background: var(--bg-card);
            display: inline-block;
            padding: 4px 12px;
            border-radius: 6px;
        }

        .panel-desc {
            font-size: 14px;
            color: var(--text-dim);
            margin-bottom: 20px;
        }

        /* Form */
        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-dim);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 8px 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 13px;
            outline: none;
            transition: border-color 0.15s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--primary);
        }

        .form-group textarea {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 12px;
            min-height: 80px;
            resize: vertical;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-row-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px;
        }

        /* Buttons */
        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .btn-danger {
            background: var(--danger);
            color: #fff;
        }

        .btn-danger:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn-sm {
            padding: 6px 14px;
            font-size: 12px;
        }

        /* Response */
        .response-area {
            margin-top: 20px;
            border-top: 1px solid var(--border);
            padding-top: 20px;
        }

        .response-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .response-header h3 {
            font-size: 14px;
            color: var(--text-dim);
        }

        .response-status {
            font-size: 12px;
            padding: 3px 10px;
            border-radius: 12px;
            font-weight: 600;
        }

        .status-2xx {
            background: rgba(34, 197, 94, 0.15);
            color: var(--success);
        }

        .status-4xx {
            background: rgba(245, 158, 11, 0.15);
            color: var(--warning);
        }

        .status-5xx {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
        }

        .status-pending {
            background: rgba(148, 163, 184, 0.15);
            color: var(--text-dim);
        }

        .response-body {
            background: #0d1117;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 16px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 12px;
            line-height: 1.6;
            overflow-x: auto;
            max-height: 500px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .response-time {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 8px;
        }

        /* Loading */
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* File upload */
        .file-upload-area {
            border: 2px dashed var(--border);
            border-radius: 6px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.15s;
        }

        .file-upload-area:hover {
            border-color: var(--primary);
        }

        .file-upload-area.has-file {
            border-color: var(--success);
        }

        .file-upload-area input {
            display: none;
        }

        .file-upload-area .icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .file-upload-area .text {
            font-size: 13px;
            color: var(--text-dim);
        }

        .file-upload-area .filename {
            font-size: 13px;
            color: var(--success);
            margin-top: 4px;
        }

        /* Collapsible */
        .collapsible-header {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            user-select: none;
            padding: 4px 0;
        }

        .collapsible-header:hover {
            color: #a5b4fc;
        }

        .collapsible-header .arrow {
            transition: transform 0.15s;
        }

        .collapsible-header .arrow.open {
            transform: rotate(90deg);
        }

        .collapsible-body {
            padding-left: 12px;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 13px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            display: none;
            z-index: 999;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .toast.show {
            display: flex;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>

<body>

    <div class="header">
        <div class="header-left">
            <h1>🔊 API 测试工具</h1>
            <span class="badge">AI 有声书工坊</span>
        </div>
        <div class="header-right">
            <label style="font-size:12px; opacity:0.8;">Base URL:</label>
            <input class="base-url-input" id="baseUrl" value="http://localhost:8000"
                placeholder="http://localhost:8000">
        </div>
    </div>

    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar" id="sidebar"></div>

        <!-- Main -->
        <div class="main" id="mainContent"></div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // ======================== API Definitions ========================
        const API_GROUPS = [
            {
                name: '健康检查',
                endpoints: [
                    { method: 'GET', path: '/api/health/', label: '健康检查', desc: '检查服务运行状态及各组件连接情况' },
                ]
            },
            {
                name: '书籍管理',
                endpoints: [
                    {
                        method: 'GET', path: '/api/books/', label: '书籍列表', desc: '获取书籍列表，支持分页、状态过滤和搜索', params: [
                            { name: 'page', label: '页码', type: 'number', default: '1' },
                            { name: 'page_size', label: '每页数量', type: 'number', default: '20' },
                            { name: 'status', label: '状态过滤', type: 'select', options: ['', 'pending', 'processing', 'done', 'failed'] },
                            { name: 'search', label: '搜索关键词', type: 'text' },
                        ]
                    },
                    {
                        method: 'GET', path: '/api/books/{pk}/', label: '书籍详情', desc: '获取单本书籍的详细信息', params: [
                            { name: 'pk', label: '书籍ID', type: 'number', required: true },
                        ]
                    },
                    {
                        method: 'GET', path: '/api/books/{pk}/chapters/', label: '书籍章节', desc: '获取指定书籍的所有章节列表', params: [
                            { name: 'pk', label: '书籍ID', type: 'number', required: true },
                        ]
                    },
                    {
                        method: 'GET', path: '/api/books/{pk}/status/', label: '书籍状态', desc: '获取书籍处理进度和状态', params: [
                            { name: 'pk', label: '书籍ID', type: 'number', required: true },
                        ]
                    },
                    {
                        method: 'POST', path: '/api/books/{pk}/generate/', label: '生成有声书', desc: '触发有声书生成任务', params: [
                            { name: 'pk', label: '书籍ID', type: 'number', required: true },
                            { name: 'generation_mode', label: '生成模式', type: 'select', options: ['auto', 'manual'], default: 'auto' },
                        ]
                    },
                    {
                        method: 'POST', path: '/api/books/{pk}/retry/', label: '重试失败章节', desc: '重试书籍中所有失败的章节', params: [
                            { name: 'pk', label: '书籍ID', type: 'number', required: true },
                        ]
                    },
                    {
                        method: 'GET', path: '/api/books/{pk}/audio/', label: '章节音频', desc: '获取指定章节的音频播放URL', params: [
                            { name: 'pk', label: '书籍ID', type: 'number', required: true },
                            { name: 'chapter_id', label: '章节ID', type: 'number', required: true },
                        ]
                    },
                    {
                        method: 'GET', path: '/api/books/{pk}/download/', label: '下载有声书', desc: '获取有声书下载链接', params: [
                            { name: 'pk', label: '书籍ID', type: 'number', required: true },
                            { name: 'format', label: '下载格式', type: 'select', options: ['mp3', 'm4b'], default: 'mp3' },
                        ]
                    },
                    {
                        method: 'GET', path: '/api/books/{pk}/subtitles/', label: '字幕下载', desc: '获取章节字幕信息', params: [
                            { name: 'pk', label: '书籍ID', type: 'number', required: true },
                            { name: 'chapter_id', label: '章节ID（可选）', type: 'number' },
                        ]
                    },
                    {
                        method: 'DELETE', path: '/api/books/{pk}/delete/', label: '删除书籍', desc: '软删除一本书籍', params: [
                            { name: 'pk', label: '书籍ID', type: 'number', required: true },
                        ]
                    },
                    {
                        method: 'POST', path: '/api/books/stop-all/', label: '停止所有制作', desc: '停止所有正在处理的有声书制作任务，将书籍和章节标记为失败', danger: true,
                    },
                    {
                        method: 'GET', path: '/api/books/{pk}/voice-recommend/', label: '音色推荐', desc: '获取书籍的推荐音色配置', params: [
                            { name: 'pk', label: '书籍ID', type: 'number', required: true },
                        ]
                    },
                ]
            },
            {
                name: '章节管理',
                endpoints: [
                    {
                        method: 'GET', path: '/api/chapters/{pk}/', label: '章节详情', desc: '获取单章节的详细信息', params: [
                            { name: 'pk', label: '章节ID', type: 'number', required: true },
                        ]
                    },
                    {
                        method: 'POST', path: '/api/chapters/{pk}/confirm/', label: '确认章节', desc: '手动模式下确认开始处理章节', params: [
                            { name: 'pk', label: '章节ID', type: 'number', required: true },
                        ]
                    },
                    {
                        method: 'POST', path: '/api/chapters/{pk}/retry/', label: '重试章节', desc: '重试单个失败的章节', params: [
                            { name: 'pk', label: '章节ID', type: 'number', required: true },
                        ]
                    },
                    {
                        method: 'GET', path: '/api/chapters/{pk}/segments/', label: '章节片段', desc: '获取章节的音频片段列表', params: [
                            { name: 'pk', label: '章节ID', type: 'number', required: true },
                        ]
                    },
                ]
            },
            {
                name: '文件上传',
                endpoints: [
                    {
                        method: 'POST', path: '/api/upload/epub/', label: '上传 EPUB', desc: '上传 EPUB 文件，自动解析并创建书籍', fileUpload: true, params: [
                            { name: 'file', label: 'EPUB 文件', type: 'file', required: true },
                        ]
                    },
                ]
            },
            {
                name: '音色管理',
                endpoints: [
                    { method: 'GET', path: '/api/voices/', label: '音色列表', desc: '获取可用的 TTS 音色列表' },
                    { method: 'GET', path: '/api/voices/emotions/', label: '情感列表', desc: '获取支持的情感列表' },
                    { method: 'GET', path: '/api/voices/roles/', label: '角色映射', desc: '获取角色-音色映射关系表' },
                    { method: 'GET', path: '/api/voices/rate-limit/', label: '速率限制', desc: '获取 TTS 速率限制状态' },
                    { method: 'GET', path: '/api/voices/cache-stats/', label: '缓存统计', desc: '获取分析器缓存统计 (GET)' },
                    { method: 'POST', path: '/api/voices/cache-stats/', label: '清空缓存', desc: '清空分析器缓存 (POST)', bodyType: true },
                ]
            },
            {
                name: '发布管理',
                endpoints: [
                    { method: 'GET', path: '/api/publish/channels/', label: '渠道列表', desc: '获取所有发布渠道' },
                    {
                        method: 'POST', path: '/api/publish/channels/create/', label: '创建渠道', desc: '创建新的发布渠道', bodyType: true, params: [
                            { name: 'name', label: '渠道名称', type: 'text', required: true },
                            { name: 'platform_type', label: '平台类型', type: 'text', required: true },
                            { name: 'api_config', label: 'API 配置 (JSON)', type: 'textarea', default: '{}' },
                            { name: 'auto_publish', label: '自动发布', type: 'select', options: ['false', 'true'], default: 'false' },
                        ]
                    },
                    {
                        method: 'GET', path: '/api/publish/channels/{pk}/', label: '渠道详情', desc: '获取发布渠道详情', params: [
                            { name: 'pk', label: '渠道ID', type: 'number', required: true },
                        ]
                    },
                    { method: 'GET', path: '/api/publish/records/', label: '发布记录', desc: '获取发布记录列表' },
                    {
                        method: 'GET', path: '/api/publish/records/{pk}/', label: '发布记录详情', desc: '获取单条发布记录', params: [
                            { name: 'pk', label: '记录ID', type: 'number', required: true },
                        ]
                    },
                ]
            },
            {
                name: '文件监听',
                endpoints: [
                    { method: 'GET', path: '/api/watch/status/', label: '监听状态', desc: '获取文件监听服务的运行状态' },
                    { method: 'POST', path: '/api/watch/restart/', label: '重启监听', desc: '重启文件监听服务' },
                    {
                        method: 'GET', path: '/api/watch/history/', label: '监听历史', desc: '获取通过监听导入的文件历史', params: [
                            { name: 'page', label: '页码', type: 'number', default: '1' },
                            { name: 'page_size', label: '每页数量', type: 'number', default: '20' },
                            { name: 'status', label: '状态过滤', type: 'select', options: ['', 'pending', 'processing', 'done', 'failed'] },
                        ]
                    },
                ]
            },
        ];

        // ======================== State ========================
        let currentEndpoint = null;

        // ======================== Render ========================
        function renderSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.innerHTML = '';
            API_GROUPS.forEach(group => {
                const section = document.createElement('div');
                section.className = 'sidebar-section';
                section.textContent = group.name;
                sidebar.appendChild(section);
                group.endpoints.forEach((ep, idx) => {
                    const btn = document.createElement('button');
                    btn.className = 'endpoint-btn';
                    btn.dataset.path = ep.path;
                    btn.innerHTML = `<span class="method-tag method-${ep.method}">${ep.method}</span><span>${ep.label}</span>`;
                    btn.onclick = () => selectEndpoint(group, ep);
                    sidebar.appendChild(btn);
                });
            });
        }

        function selectEndpoint(group, ep) {
            currentEndpoint = { group, ep };
            document.querySelectorAll('.endpoint-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll(`.endpoint-btn[data-path="${ep.path}"]`).forEach(b => b.classList.add('active'));
            renderPanel(ep);
        }

        function renderPanel(ep) {
            const main = document.getElementById('mainContent');
            const baseUrl = document.getElementById('baseUrl').value.replace(/\/+$/, '');
            const pathPattern = ep.path;

            // Replace path params for display
            let displayPath = pathPattern;
            const pathParams = ep.params ? ep.params.filter(p => pathPattern.includes(`{${p.name}}`)) : [];
            pathParams.forEach(p => {
                displayPath = displayPath.replace(`{${p.name}}`, `:${p.name}`);
            });

            let html = `
    <div class="panel active">
      <div class="panel-title">${ep.label}</div>
      <div><span class="panel-path"><span class="method-tag method-${ep.method}">${ep.method}</span> ${baseUrl}${displayPath}</span></div>
      <div class="panel-desc">${ep.desc || ''}</div>
      <div class="form-area" id="formArea">
  `;

            // Build form
            if (ep.params && ep.params.length > 0) {
                const queryParams = ep.params.filter(p => !pathPattern.includes(`{${p.name}}`));
                const hasBody = ep.bodyType;

                // Path params
                if (pathParams.length > 0) {
                    html += `<div class="collapsible-header" onclick="toggleCollapse(this)"><span class="arrow">▶</span> 路径参数</div>
        <div class="collapsible-body" style="margin-bottom:12px;">`;
                    pathParams.forEach(p => {
                        html += renderFormField(p);
                    });
                    html += `</div>`;
                }

                // Query params
                if (queryParams.length > 0 && !hasBody && !ep.fileUpload) {
                    html += `<div class="collapsible-header" onclick="toggleCollapse(this)"><span class="arrow open">▶</span> 查询参数</div>
        <div class="collapsible-body open" style="margin-bottom:12px;">`;
                    queryParams.forEach(p => {
                        html += renderFormField(p);
                    });
                    html += `</div>`;
                }

                // Body (JSON)
                if (hasBody && queryParams.length > 0) {
                    html += `<div class="collapsible-header" onclick="toggleCollapse(this)"><span class="arrow open">▶</span> 请求体 (JSON)</div>
        <div class="collapsible-body open" style="margin-bottom:12px;">`;
                    queryParams.forEach(p => {
                        html += renderFormField(p);
                    });
                    html += `</div>`;
                }

                // File upload
                if (ep.fileUpload) {
                    html += `<div class="form-group">
        <label>选择 EPUB 文件</label>
        <div class="file-upload-area" id="fileUploadArea" onclick="document.getElementById('fileInput').click()">
          <div class="icon">📂</div>
          <div class="text">点击选择文件或拖拽到这里</div>
          <div class="filename" id="fileName"></div>
          <input type="file" id="fileInput" accept=".epub" onchange="onFileSelect(event)">
        </div>
      </div>`;
                }
            }

            // Submit button - danger style for stop operations
            const btnClass = ep.danger ? 'btn-danger' : 'btn-primary';
            const btnIcon = ep.danger ? '⛔' : '▶';
            const btnText = ep.danger ? '确认停止所有制作' : '发送请求';
            html += `
      <button class="btn ${btnClass}" onclick="executeRequest()" id="submitBtn">
        ${btnIcon} ${btnText}
      </button>
      ${ep.danger ? '<div style="margin-top:8px;font-size:12px;color:var(--warning);">⚠️ 此操作将停止所有正在处理的有声书制作，不可恢复！</div>' : ''}
    </div>
    <div class="response-area" id="responseArea" style="display:none;">
      <div class="response-header">
        <h3>📡 响应</h3>
        <span class="response-status status-pending" id="statusBadge">等待请求</span>
      </div>
      <div class="response-body" id="responseBody"></div>
      <div class="response-time" id="responseTime"></div>
    </div>
  `;

            main.innerHTML = html;
        }

        function renderFormField(param) {
            const id = `param_${param.name}`;
            const defaultValue = param.default || '';
            let input = '';

            if (param.type === 'select') {
                let opts = (param.options || []).map(o =>
                    `<option value="${o}"${o === defaultValue ? ' selected' : ''}>${o || '(不限)'}</option>`
                ).join('');
                input = `<select id="${id}">${opts}</select>`;
            } else if (param.type === 'textarea') {
                input = `<textarea id="${id}" placeholder="${param.label}">${defaultValue}</textarea>`;
            } else {
                input = `<input type="${param.type || 'text'}" id="${id}" placeholder="${param.label}" value="${defaultValue}">`;
            }

            return `<div class="form-group"><label>${param.label} ${param.required ? '<span style="color:var(--danger)">*</span>' : ''}</label>${input}</div>`;
        }

        // ======================== Actions ========================
        function toggleCollapse(header) {
            const arrow = header.querySelector('.arrow');
            const body = header.nextElementSibling;
            const isOpen = arrow.classList.contains('open');
            arrow.classList.toggle('open', !isOpen);
            body.classList.toggle('open', !isOpen);
        }

        function onFileSelect(event) {
            const file = event.target.files[0];
            const area = document.getElementById('fileUploadArea');
            const nameEl = document.getElementById('fileName');
            if (file) {
                area.classList.add('has-file');
                nameEl.textContent = `✅ ${file.name} (${(file.size / 1024).toFixed(1)} KB)`;
            } else {
                area.classList.remove('has-file');
                nameEl.textContent = '';
            }
        }

        function showToast(msg, type) {
            const toast = document.getElementById('toast');
            const icons = { success: '✅', error: '❌', info: 'ℹ️' };
            toast.innerHTML = `${icons[type] || 'ℹ️'} ${msg}`;
            toast.className = 'toast show';
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function getFormValue(param) {
            const el = document.getElementById(`param_${param.name}`);
            if (!el) return param.default || '';
            if (param.type === 'number' && el.value !== '') return Number(el.value);
            return el.value;
        }

        async function executeRequest() {
            if (!currentEndpoint) return;
            const { ep } = currentEndpoint;

            // Confirmation for danger operations
            if (ep.danger) {
                const confirmed = confirm('⚠️ 确定要停止所有正在处理的有声书制作吗？\n\n此操作将：\n• 标记所有处理中的书籍为失败状态\n• 停止正在运行的合成任务\n• 不可恢复！');
                if (!confirmed) return;
            }

            const baseUrl = document.getElementById('baseUrl').value.replace(/\/+$/, '');
            const btn = document.getElementById('submitBtn');
            const respArea = document.getElementById('responseArea');
            const respBody = document.getElementById('responseBody');
            const statusBadge = document.getElementById('statusBadge');
            const respTime = document.getElementById('responseTime');

            // Disable button
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span> 发送中...';
            respArea.style.display = 'block';
            respBody.textContent = '正在请求...';
            statusBadge.className = 'response-status status-pending';
            statusBadge.textContent = '请求中';
            respTime.textContent = '';

            try {
                let url = baseUrl + ep.path;
                const headers = {};
                let body = null;
                const queryParams = [];

                // Process params
                const pathParamNames = (ep.path.match(/\{(\w+)\}/g) || []).map(p => p.slice(1, -1));

                if (ep.params) {
                    // Path params - replace in URL
                    pathParamNames.forEach(name => {
                        const param = ep.params.find(p => p.name === name);
                        if (param) {
                            const val = getFormValue(param);
                            url = url.replace(`{${name}}`, val);
                        }
                    });

                    // Query / body params
                    const otherParams = ep.params.filter(p => !pathParamNames.includes(p.name));

                    if (ep.fileUpload) {
                        // Multipart form data
                        const fileInput = document.getElementById('fileInput');
                        if (fileInput && fileInput.files[0]) {
                            const formData = new FormData();
                            formData.append('file', fileInput.files[0]);
                            body = formData;
                            // Don't set Content-Type, let browser set multipart boundary
                        } else {
                            throw new Error('请选择要上传的文件');
                        }
                    } else if (ep.bodyType) {
                        // JSON body
                        const jsonBody = {};
                        otherParams.forEach(p => {
                            let val = getFormValue(p);
                            if (p.type === 'textarea') {
                                try { val = JSON.parse(val); } catch (e) { }
                            }
                            if (p.type === 'select' && (val === 'true' || val === 'false')) {
                                val = val === 'true';
                            }
                            jsonBody[p.name] = val;
                        });
                        body = JSON.stringify(jsonBody);
                        headers['Content-Type'] = 'application/json';
                    } else {
                        // Query params
                        otherParams.forEach(p => {
                            const val = getFormValue(p);
                            if (val !== '' && val !== null && val !== undefined) {
                                queryParams.push(`${encodeURIComponent(p.name)}=${encodeURIComponent(val)}`);
                            }
                        });
                    }
                }

                if (queryParams.length > 0) {
                    url += '?' + queryParams.join('&');
                }

                const startTime = performance.now();
                const response = await fetch(url, {
                    method: ep.method,
                    headers: headers,
                    body: body,
                });
                const endTime = performance.now();
                const elapsed = (endTime - startTime).toFixed(0);

                // Get response text
                const contentType = response.headers.get('content-type') || '';
                let respText;
                if (contentType.includes('application/json')) {
                    const json = await response.json();
                    respText = JSON.stringify(json, null, 2);
                } else {
                    respText = await response.text();
                }

                // Update UI
                const statusCode = response.status;
                let statusClass = 'status-5xx';
                if (statusCode < 300) statusClass = 'status-2xx';
                else if (statusCode < 500) statusClass = 'status-4xx';

                statusBadge.className = `response-status ${statusClass}`;
                statusBadge.textContent = `${statusCode} ${response.statusText}`;
                respBody.textContent = respText;
                respTime.textContent = `⏱ ${elapsed}ms`;

                showToast(`${ep.method} ${response.status}`, response.ok ? 'success' : 'error');
            } catch (err) {
                statusBadge.className = 'response-status status-5xx';
                statusBadge.textContent = '请求失败';
                respBody.textContent = `错误: ${err.message}\n\n请检查:\n1. 后端服务是否已启动\n2. Base URL 是否正确\n3. 参数是否完整`;
                respTime.textContent = '';
                showToast(err.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '▶ 发送请求';
            }
        }

        // ======================== Init ========================
        renderSidebar();
        // Select first endpoint
        if (API_GROUPS.length > 0 && API_GROUPS[0].endpoints.length > 0) {
            selectEndpoint(API_GROUPS[0], API_GROUPS[0].endpoints[0]);
        }
    </script>
</body>

</html>
